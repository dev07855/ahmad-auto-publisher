name: publish-app
on:
  repository_dispatch:
    types: [publish_app]
permissions:
  contents: read
# نشر واحد فقط في كل وقت — يمنع استخدام جلسة البوت من عنوانين معاً (تلقرام يلغيها)
concurrency:
  group: publish-serial
  cancel-in-progress: false
jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r worker/requirements.txt
      - name: write dylib from secret (gzip+base64)
        run: printf '%s' "${{ secrets.DYLIB_GZ_B64 }}" | base64 -d | gunzip > worker/fixipa.dylib
      - name: process & publish
        working-directory: worker
        env:
          AHMAD_EMAIL: ${{ secrets.AHMAD_EMAIL }}
          AHMAD_PASSWORD: ${{ secrets.AHMAD_PASSWORD }}
          DYLIB_PATH: fixipa.dylib
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHANNEL: ${{ secrets.TG_CHANNEL }}
          CHANNEL_FOOTER: ${{ secrets.CHANNEL_FOOTER }}
          BRAIN_URL: ${{ secrets.BRAIN_URL }}
          ENQUEUE_SECRET: ${{ secrets.ENQUEUE_SECRET }}
          PUBLISH: '1'
          APP_ID: ${{ github.event.client_payload.app_id }}
          DL: ${{ github.event.client_payload.download_url }}
          FOOTER: ${{ github.event.client_payload.footer }}
          CHANNELS: ${{ github.event.client_payload.channels }}
        run: python run_publish.py
